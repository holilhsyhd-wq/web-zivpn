<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard</title>
  <style>
    body{margin:0;font-family:system-ui;background:#0b1220;color:#e5e7eb;min-height:100vh;padding:20px}
    .card{max-width:760px;margin:auto;background:#0f172a;border:1px solid #1f2a44;border-radius:16px;padding:16px}
    input,select,button{padding:12px;border-radius:12px;border:1px solid #1f2a44;background:#0a0f1a;color:#e5e7eb;outline:none;margin:6px 0;width:100%}
    button{cursor:pointer;border:none;background:#7c3aed}
    .row{display:flex;gap:10px}
    .row > *{flex:1}
    .muted{color:#9ca3af;font-size:12px}
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div>
        <h3>Dashboard</h3>
        <div class="muted">Saldo: <b id="saldo">Rp 0</b> | Role: <b id="role">user</b></div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:10px">
        <button id="btnAdmin" style="background:#111827;border:1px solid #1f2a44;display:none">Admin</button>
        <button id="btnLogout" style="background:#ef4444">Logout</button>
      </div>
    </div>

    <label>Server</label>
    <select id="server"></select>

    <label>Password akun</label>
    <input id="pass" placeholder="test123">

    <div class="row">
      <div>
        <label>Hari</label>
        <input id="days" type="number" min="1" max="365" value="30">
      </div>
      <div style="display:flex;flex-direction:column;justify-content:flex-end">
        <button id="btnCreate">Create</button>
        <button id="btnRenew" style="background:#22c55e">Renew</button>
      </div>
    </div>

    <div class="row">
      <button onclick="location.href='/topup'" style="background:#f59e0b">Topup</button>
      <button id="btnRefresh" style="background:#111827;border:1px solid #1f2a44">Refresh</button>
    </div>

    <div class="muted" id="msg"></div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC2qOtuozewG34P41Vkl6I_bR9wk43tUlQ",
    authDomain: "zivpn-e1dd7.firebaseapp.com",
    projectId: "zivpn-e1dd7",
    storageBucket: "zivpn-e1dd7.firebasestorage.app",
    messagingSenderId: "1010308048069",
    appId: "1:1010308048069:web:d7d69ae0029941d5957cac",
    measurementId: "G-TDTWLNETJ6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const $ = (id)=>document.getElementById(id);

  async function api(path, method, body, token){
    const res = await fetch(path, {
      method,
      headers: { "Authorization":"Bearer "+token, ...(body?{"content-type":"application/json"}:{}) },
      body: body ? JSON.stringify(body) : null
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok || data.ok===false) throw new Error(data.msg || "Error");
    return data;
  }

  async function refresh(token){
    const s = await api("/api/servers","GET",null,token);
    $("saldo").textContent = "Rp " + (s.me.saldo||0).toLocaleString("id-ID");
    $("role").textContent = s.me.role || "user";
    $("btnAdmin").style.display = (s.me.role==="admin") ? "inline-block" : "none";

    $("server").innerHTML = "";
    s.servers.forEach(x=>{
      const o=document.createElement("option");
      o.value=x.id; o.textContent=`${x.name} (${x.domain})`;
      $("server").appendChild(o);
    });
  }

  onAuthStateChanged(auth, async (u)=>{
    if(!u) return location.href="/login";
    const token = await u.getIdToken();

    $("btnLogout").onclick = ()=>signOut(auth);
    $("btnAdmin").onclick = ()=>location.href="/admin";
    $("btnRefresh").onclick = ()=>refresh(token).catch(e=>$("msg").textContent=e.message);

    $("btnCreate").onclick = async ()=>{
      try{
        const out = await api("/api/account-create","POST",{
          serverId: $("server").value,
          password: $("pass").value.trim(),
          days: Number($("days").value||0)
        },token);
        $("msg").textContent = out.msg;
        await refresh(token);
      }catch(e){ $("msg").textContent = e.message; }
    };

    $("btnRenew").onclick = async ()=>{
      try{
        const out = await api("/api/account-renew","POST",{
          serverId: $("server").value,
          password: $("pass").value.trim(),
          days: Number($("days").value||0)
        },token);
        $("msg").textContent = out.msg;
        await refresh(token);
      }catch(e){ $("msg").textContent = e.message; }
    };

    await refresh(token);
  });
</script>
</body>
</html>
